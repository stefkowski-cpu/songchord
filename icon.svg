  <!-- App name -->
  <text x="90" y="141" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#e94560" letter-spacing="1">songchord</text>
  <text x="90" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#f0ece2" letter-spacing="2">mega</text>
